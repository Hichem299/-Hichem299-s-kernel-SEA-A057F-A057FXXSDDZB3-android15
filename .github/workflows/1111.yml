name: Build Samsung Galaxy A05s SM-A057F Kernel

on:
  workflow_dispatch:
    inputs:
      kp_target:
        description: "Kernel target"
        required: false
        default: "m269"
      kp_variant:
        description: "Kernel variant"
        required: false
        default: "sec"
      build_variant:
        description: "Build variant"
        required: false
        default: "user"
  push:
    branches:
      - main
      - master

env:
  CHIPSET_NAME: sm6225
  KERNEL_TARGET: ${{ github.event.inputs.kp_target || 'm269' }}
  KERNEL_VARIANT: ${{ github.event.inputs.kp_variant || 'sec' }}
  TARGET_BUILD_VARIANT: ${{ github.event.inputs.build_variant || 'user' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo docker system prune -af || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            cpio \
            curl \
            dwarves \
            file \
            flex \
            git \
            jq \
            libdw-dev \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            lz4 \
            python-is-python3 \
            python3 \
            python3-pip \
            rsync \
            unzip \
            wget \
            xz-utils \
            zip \
            zstd \
            ca-certificates

      - name: Normalize permissions and line endings
        shell: bash
        run: |
          set -euxo pipefail

          git config --global user.name "Hichem"
          git config --global user.email "hichem@kernel.internal"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          find . -type f \( -name "*.sh" -o -name "*.py" -o -name "*.pl" \) -print0 | xargs -0 -r sed -i 's/\r$//'
          find . -type f \( -name "*.sh" -o -name "*.py" -o -name "*.pl" \) -print0 | xargs -0 -r chmod 755

          find kernel_platform -path "*/scripts/*" -type f ! -name "*.*" -exec chmod 755 {} + 2>/dev/null || true

          chmod +x build_kernel_GKI.sh 2>/dev/null || true
          chmod +x kernel_platform/build/build.sh 2>/dev/null || true
          chmod +x kernel_platform/build/kernel/build.sh 2>/dev/null || true
          chmod +x kernel_platform/build/kernel/android/prepare_vendor.sh 2>/dev/null || true

          find kernel_platform/build/kernel/build-tools/path/linux-x86 -type f -exec chmod +x {} + 2>/dev/null || true

      - name: Prepare Android prebuilts
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p kernel_platform/prebuilts/clang/host
          mkdir -p kernel_platform/prebuilts/kernel-build-tools
          mkdir -p kernel_platform/prebuilts/jdk

          if [ ! -d kernel_platform/prebuilts/clang/host/linux-x86/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
              kernel_platform/prebuilts/clang/host/linux-x86
          fi

          if [ ! -d kernel_platform/prebuilts/kernel-build-tools/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/kernel/prebuilts/kernel-build-tools \
              kernel_platform/prebuilts/kernel-build-tools
          fi

          if [ ! -d kernel_platform/prebuilts/jdk/jdk11/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/jdk/jdk11 \
              kernel_platform/prebuilts/jdk/jdk11
          fi

          find kernel_platform/prebuilts/clang/host/linux-x86 -type f -path "*/bin/*" -exec chmod +x {} + 2>/dev/null || true
          find kernel_platform/prebuilts/kernel-build-tools -type f -path "*/bin/*" -exec chmod +x {} + 2>/dev/null || true
          find kernel_platform/prebuilts/jdk/jdk11 -type f -path "*/bin/*" -exec chmod +x {} + 2>/dev/null || true

      - name: Set output directories
        shell: bash
        run: |
          set -euxo pipefail
          echo "OUT_DIR=$GITHUB_WORKSPACE/kernel_platform/out/a05s-${KERNEL_TARGET}-${KERNEL_VARIANT}-gki" >> "$GITHUB_ENV"
          echo "DIST_DIR=$GITHUB_WORKSPACE/kernel_platform/out/a05s-${KERNEL_TARGET}-${KERNEL_VARIANT}-gki/dist" >> "$GITHUB_ENV"

      - name: Inject Samsung config overrides
        shell: bash
        run: |
          set -euxo pipefail

          BASE_FRAGMENT="kernel_platform/msm-kernel/arch/arm64/configs/vendor/${KERNEL_TARGET}_${KERNEL_VARIANT}_defconfig"
          USERDEBUG_FRAGMENT="kernel_platform/msm-kernel/arch/arm64/configs/vendor/${KERNEL_TARGET}_${KERNEL_VARIANT}_userdebug_defconfig"
          ENG_FRAGMENT="kernel_platform/msm-kernel/arch/arm64/configs/vendor/${KERNEL_TARGET}_${KERNEL_VARIANT}_eng_defconfig"
          EXTRA_FRAGMENT="kernel_platform/msm-kernel/arch/arm64/configs/vendor/${KERNEL_TARGET}_${KERNEL_VARIANT}_ci_kvm_lto.fragment"

          test -f "$BASE_FRAGMENT"

          cat > "$EXTRA_FRAGMENT" <<'EOF'
          # CI_KVM_LTO_FRAGMENT
          # Reduce memory pressure on GitHub Actions runner
          # CONFIG_LTO_CLANG_FULL is not set
          CONFIG_LTO_CLANG=y
          CONFIG_LTO_CLANG_THIN=y

          # Virtualization / KVM
          CONFIG_KVM=y
          CONFIG_KVM_ARM_HOST=y
          CONFIG_KVM_ARM_PMU=y
          CONFIG_KVM_ARM_VGIC=y
          CONFIG_KVM_ARM_VGIC_V3=y
          CONFIG_KVM_ARM_TIMER=y
          CONFIG_VIRTUALIZATION=y
          CONFIG_ARM64_VHE=y
          CONFIG_SYS_HYPERVISOR=y

          # Qualcomm / Gunyah
          CONFIG_QCOM_SCM=y
          CONFIG_GUNYAH=y
          CONFIG_GUNYAH_PLATFORM=y
          CONFIG_GUNYAH_RESOURCE_MANAGER=y

          # VirtIO / vhost
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_BLK=y
          CONFIG_VIRTIO_NET=y
          CONFIG_VIRTIO_CONSOLE=y
          CONFIG_VIRTIO_INPUT=y
          CONFIG_VIRTIO_MMIO=y
          CONFIG_VHOST=y
          CONFIG_VHOST_NET=y
          EOF

          for FRAG in "$BASE_FRAGMENT" "$USERDEBUG_FRAGMENT" "$ENG_FRAGMENT"; do
            if [ -f "$FRAG" ] && ! grep -q 'CI_KVM_LTO_FRAGMENT' "$FRAG"; then
              {
                echo
                cat "$EXTRA_FRAGMENT"
              } >> "$FRAG"
            fi
          done

          echo "Injected into:"
          ls -l "$BASE_FRAGMENT"
          [ -f "$USERDEBUG_FRAGMENT" ] && ls -l "$USERDEBUG_FRAGMENT" || true
          [ -f "$ENG_FRAGMENT" ] && ls -l "$ENG_FRAGMENT" || true

      - name: Show selected build chain
        shell: bash
        run: |
          set -euxo pipefail
          echo "KERNEL_TARGET=${KERNEL_TARGET}"
          echo "KERNEL_VARIANT=${KERNEL_VARIANT}"
          echo "TARGET_BUILD_VARIANT=${TARGET_BUILD_VARIANT}"
          echo "CHIPSET_NAME=${CHIPSET_NAME}"
          echo "OUT_DIR=${OUT_DIR}"
          echo "DIST_DIR=${DIST_DIR}"

          sed -n '1,40p' kernel_platform/build.config
          sed -n '1,80p' kernel_platform/msm-kernel/build.config.msm.${KERNEL_TARGET}.${KERNEL_VARIANT}
          sed -n '1,80p' kernel_platform/msm-kernel/build.config.${KERNEL_VARIANT}

      - name: Build kernel with official Samsung/Android flow
        shell: bash
        run: |
          set -euxo pipefail

          cd kernel_platform

          export BUILD_CONFIG=build.config
          export VARIANT=gki
          export TARGET_BUILD_VARIANT="${TARGET_BUILD_VARIANT}"
          export OUT_DIR="${OUT_DIR}"
          export DIST_DIR="${DIST_DIR}"
          export BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          ./build/build.sh -j"$(nproc)"

      - name: Verify injected config in final .config
        shell: bash
        run: |
          set -euxo pipefail

          test -f "${OUT_DIR}/.config"

          grep -E '^CONFIG_LTO_CLANG=y$' "${OUT_DIR}/.config"
          grep -E '^CONFIG_LTO_CLANG_THIN=y$' "${OUT_DIR}/.config"
          grep -E '^CONFIG_KVM=y$' "${OUT_DIR}/.config"
          grep -E '^CONFIG_KVM_ARM_HOST=y$' "${OUT_DIR}/.config"
          grep -E '^CONFIG_VIRTUALIZATION=y$' "${OUT_DIR}/.config"
          grep -E '^CONFIG_ARM64_VHE=y$' "${OUT_DIR}/.config"

      - name: Collect artifacts
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts

          cp -f "${OUT_DIR}/.config" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/Image" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/Image.gz" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/Image.lz4" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/vmlinux" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/System.map" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/modules.load" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/modules.blocklist" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/gki-info.txt" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/boot.img" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/vendor_boot.img" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/init_boot.img" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/dtb.img" artifacts/ 2>/dev/null || true
          cp -f "${DIST_DIR}/dtbo.img" artifacts/ 2>/dev/null || true

          find "${DIST_DIR}" -type f -name "*.ko" -exec cp -f {} artifacts/ \; 2>/dev/null || true
          find "${DIST_DIR}" -maxdepth 1 -type f | sort || true
          ls -lah artifacts || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A05s-A057F-kernel-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
