name: Build Samsung Galaxy A05s SM-A057F Kernel

on:
  workflow_dispatch:
    inputs:
      kp_target:
        description: "Kernel target (e.g., m269_sec)"
        required: false
        default: "m269_sec"
      build_variant:
        description: "Build variant"
        required: false
        default: "user"
  push:
    branches:
      - main
      - master

env:
  CHIPSET_NAME: sm6225
  BUILD_TARGET_INPUT: ${{ github.event.inputs.kp_target || 'm269_sec' }}
  TARGET_BUILD_VARIANT: ${{ github.event.inputs.build_variant || 'user' }}
  CLANG_VERSION: r450784e

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Free some disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget zip unzip xz-utils zstd lz4 cpio rsync bc bison flex \
            build-essential libssl-dev libelf-dev dwarves pahole python3 python3-pip \
            ca-certificates file jq repo llvm clang
      - name: Prepare Android prebuilts
        run: |
          set -eux

          mkdir -p kernel_platform/prebuilts/clang/host
          mkdir -p kernel_platform/prebuilts/build-tools
          mkdir -p kernel_platform/prebuilts/kernel-build-tools
          mkdir -p kernel_platform/prebuilts/jdk
          mkdir -p kernel_platform/prebuilts/bazel

          if [ ! -d kernel_platform/prebuilts/clang/host/linux-x86/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
              kernel_platform/prebuilts/clang/host/linux-x86
          fi

          if [ ! -d kernel_platform/prebuilts/build-tools/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/kernel/prebuilts/build-tools \
              kernel_platform/prebuilts/build-tools
          fi

          if [ ! -d kernel_platform/prebuilts/kernel-build-tools/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/kernel/prebuilts/kernel-build-tools \
              kernel_platform/prebuilts/kernel-build-tools
          fi

          if [ ! -d kernel_platform/prebuilts/jdk/jdk11/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/jdk/jdk11 \
              kernel_platform/prebuilts/jdk/jdk11
          fi

          if [ ! -d kernel_platform/prebuilts/bazel/linux-x86_64/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/bazel/linux-x86_64 \
              kernel_platform/prebuilts/bazel/linux-x86_64
          fi

            - name: Fix script paths and permissions
        run: |
          set -eux

          chmod +x build_kernel_GKI.sh || true
          find kernel_platform/build -type f -name "*.sh" -exec chmod +x {} \; || true
          find kernel_platform/prebuilts -type f -path "*/bin/*" -exec chmod +x {} \; || true

          sed -i \
            's#./kernel_platform/build/android/prepare_vendor.sh#./kernel_platform/build/kernel/android/prepare_vendor.sh#g' \
            build_kernel_GKI.sh || true

      - name: Show selected config
        run: |
          echo "KP_TARGET=${KP_TARGET}"
          echo "KP_VARIANT=${KP_VARIANT}"
          echo "TARGET_BUILD_VARIANT=${TARGET_BUILD_VARIANT}"
          echo "CHIPSET_NAME=${CHIPSET_NAME}"
   
      - name: Patch KVM config fragment
        run: |
          set -eux
          KDIR="kernel_platform"
          if [ -d "kernel_platform/common" ]; then
            KDIR="kernel_platform/common"
          fi

          mkdir -p "${KDIR}/arch/arm64/configs"

          printf '%s\n' \
            'CONFIG_KVM=y' \
            'CONFIG_KVM_ARM_HOST=y' \
            'CONFIG_KVM_ARM_PMU=y' \
            'CONFIG_KVM_ARM_PV_TIME=y' \
            'CONFIG_KVM_ARM_VGIC=y' \
            'CONFIG_KVM_ARM_VGIC_V3=y' \
            'CONFIG_KVM_ARM_VGIC_V3_SYSREGS=y' \
            'CONFIG_KVM_ARM_TIMER=y' \
            'CONFIG_KVM_MMIO=y' \
            'CONFIG_GKI_HIDDEN_VIRTUAL_CONFIGS=y' \
            'CONFIG_GKI_HIDDEN_HYPERVISOR_CONFIGS=y' \
            'CONFIG_SYS_HYPERVISOR=y' \
            'CONFIG_CRYPTO_DEV_VIRTIO=y' \
            'CONFIG_VIRTUALIZATION=y' \
            'CONFIG_VIRTIO=y' \
            'CONFIG_VIRTIO_BLK=y' \
            'CONFIG_VIRTIO_NET=y' \
            'CONFIG_VIRTIO_CONSOLE=y' \
            'CONFIG_VIRTIO_PCI_LIB=y' \
            'CONFIG_VIRTIO_MENU=y' \
            'CONFIG_VIRTIO_PCI=y' \
            'CONFIG_VIRTIO_PCI_LEGACY=y' \
            'CONFIG_VIRTIO_BALLOON=y' \
            'CONFIG_VIRTIO_INPUT=y' \
            'CONFIG_VIRTIO_MMIO=y' \
            'CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y' \
            'CONFIG_VIRTIO_DMA_SHARED_BUFFER=y' \
            'CONFIG_VHOST_MENU=y' \
            'CONFIG_VHOST=y' \
            'CONFIG_VHOST_NET=y' \
            'CONFIG_VHOST_VSOCK=y' \
            'CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y' \
            'CONFIG_ARM64_VHE=y' \
            'CONFIG_ARM64_4K_PAGES=y' \
            'CONFIG_GUNYAH=y' \
            'CONFIG_GUNYAH_PLATFORM=y' \
            'CONFIG_GUNYAH_RESOURCE_MANAGER=y' \
            'CONFIG_QCOM_SCM=y' \
            'CONFIG_ANDROID_VIRTUALIZATION_FRAMEWORK=y' \
            'CONFIG_CMDLINE="stack_depot_disable=on kasan.stacktrace=off kvm-arm.mode=nvhe cgroup_disable=pressure id_aa64mmfr1.vh=1"' \
            > "${KDIR}/arch/arm64/configs/kvm_nvhe.fragment"

      - name: Build kernel
        run: |
          set -eux

          # 1. إعداد المتغيرات الموجهة لسكربت سامسونج
          export MODEL=$(echo "${BUILD_TARGET_INPUT}" | cut -d'_' -f1)
          export PROJECT_NAME="${MODEL}"
          export REGION=$(echo "${BUILD_TARGET_INPUT}" | cut -d'_' -f2)
          export CARRIER=$(echo "${BUILD_TARGET_INPUT}" | cut -d'_' -f3)
          export TARGET_BUILD_VARIANT="${TARGET_BUILD_VARIANT}"
          
          # 2. إعداد مسارات ومخرجات GKI لشرائح كوالكوم
          export ANDROID_BUILD_TOP="${GITHUB_WORKSPACE}"
          export TARGET_PRODUCT=gki
          export TARGET_BOARD_PLATFORM=gki

          export ANDROID_PRODUCT_OUT="${ANDROID_BUILD_TOP}/out/target/product/${MODEL}"
          export OUT_DIR="${ANDROID_BUILD_TOP}/out/msm-${CHIPSET_NAME}-${CHIPSET_NAME}-${TARGET_PRODUCT}"
          export RECOMPILE_KERNEL=1

          # ربط مسار الـ Clang Toolchain بالبيئة للتأكيد على استخدام المحرك المخصص
          export PATH="${ANDROID_BUILD_TOP}/kernel_platform/prebuilts/clang/host/linux-x86/${CLANG_VERSION}/bin:${PATH}"

          # 3. إعداد موديولات الأقسام الخارجية (Techpack) لمنع التوقف المفاجئ
          export KBUILD_EXTRA_SYMBOLS="${ANDROID_BUILD_TOP}/out/vendor/qcom/opensource/mmrm-driver/Module.symvers \
              ${ANDROID_BUILD_TOP}/out/vendor/qcom/opensource/mm-drivers/hw_fence/Module.symvers \
              ${ANDROID_BUILD_TOP}/out/vendor/qcom/opensource/mm-drivers/sync_fence/Module.symvers \
              ${ANDROID_BUILD_TOP}/out/vendor/qcom/opensource/mm-drivers/msm_ext_display/Module.symvers \
              ${ANDROID_BUILD_TOP}/out/vendor/qcom/opensource/securemsm-kernel/Module.symvers"

          export MODNAME=audio_dlkm

          export KBUILD_EXT_MODULES="../vendor/qcom/opensource/mm-drivers/msm_ext_display \
            ../vendor/qcom/opensource/mm-drivers/sync_fence \
            ../vendor/qcom/opensource/mm-drivers/hw_fence \
            ../vendor/qcom/opensource/mmrm-driver \
            ../vendor/qcom/opensource/securemsm-kernel \
            ../vendor/qcom/opensource/display-drivers/msm \
            ../vendor/qcom/opensource/audio-kernel \
            ../vendor/qcom/opensource/camera-kernel"

          # تأمين شجرة المجلدات والمجلد الفرعي dist مسبقاً
          mkdir -p "${ANDROID_PRODUCT_OUT}"
          mkdir -p "${OUT_DIR}"
          mkdir -p "${OUT_DIR}/dist"

          # 4. إصلاح تعاودي لصلاحيات ملفات الشل والسكربتات التابعة
          find kernel_platform/ -type f -name "*.sh" -exec chmod +x {} + || true
          if [ -d "kernel_platform/build" ]; then
            find kernel_platform/build/ -type f -exec chmod +x {} + || true
          fi

          # 5. استهداف وتشغيل السكربت الرئيسي ديناميكياً لتفادي مسار جذر المستودع المكسور
          SCRIPT_PATH=$(find . -type f -name "prepare_vendor.sh" | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "خطأ: لم يتم العثور على ملف prepare_vendor.sh!"
            exit 1
          fi

          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          SCRIPT_NAME=$(basename "$SCRIPT_PATH")

          cd "$SCRIPT_DIR"
          chmod +x "$SCRIPT_NAME"
          
          # إطلاق البناء الفعلي
          bash "$SCRIPT_NAME" sec "${TARGET_PRODUCT}"

      - name: Collect artifacts
        if: always()
        run: |
          set +e
          mkdir -p artifacts

          # جلب الكيرنل النهائي وكافة موديولات الكومبايلر بصيغة .ko
          find out -type f \( \
            -name "Image" -o \
            -name "Image.gz" -o \
            -name "Image.gz-dtb" -o \
            -name "boot.img" -o \
            -name "vendor_boot.img" -o \
            -name "dtb.img" -o \
            -name "dtbo.img" -o \
            -name "*.ko" -o \
            -name "System.map" -o \
            -name "modules.load" -o \
            -name "modules.blocklist" -o \
            -name "vmlinux" \
          \) -exec cp --parents {} artifacts/ \; 2>/dev/null || true

          find . -maxdepth 3 -type f -name "*.zip" -exec cp --parents {} artifacts/ \; 2>/dev/null || true

          echo "Collected files:"
          find artifacts -type f | sort || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A05s-A057F-kernel-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 7
