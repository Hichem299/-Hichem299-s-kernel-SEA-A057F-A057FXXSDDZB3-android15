name: Build Samsung A05s A057F Android 15 Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex gawk git \
            libelf-dev libssl-dev lld lz4 unzip zip zstd rsync \
            dwarves device-tree-compiler python3 python3-pip

      - name: Apply kernel config overrides
        working-directory: kernel_platform/msm-kernel/arch/arm64/configs
        run: |
          # تفعيل خيارات KVM والمحاكاة الافتراضية
          echo "CONFIG_VIRTUALIZATION=y" >> m269_sec_defconfig
          echo "CONFIG_KVM=y" >> m269_sec_defconfig
          echo "CONFIG_KVM_ARM_HOST=y" >> m269_sec_defconfig
          echo "CONFIG_VIRTIO=y" >> m269_sec_defconfig
          echo "CONFIG_VIRTIO_NET=y" >> m269_sec_defconfig
          echo "CONFIG_VIRTIO_BLK=y" >> m269_sec_defconfig
          echo "CONFIG_VHOST_NET=y" >> m269_sec_defconfig
          echo "CONFIG_VSOCKETS=y" >> m269_sec_defconfig

      - name: Build kernel
        working-directory: kernel_platform
        env:
          BUILD_CONFIG: msm-kernel/build.config.msm.m269.sec
        run: |
          chmod +x build/build.sh
          ./build/build.sh -j"$(nproc --all)"

      - name: Verify output
        run: |
          ls -lah out/dist
          test -f out/dist/Image && echo "✅ Kernel built successfully!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: A05s-A057F-Android15-kernel
          if-no-files-found: warn
          path: |
            out/dist/Image
            out/dist/*.dtb
            out/dist/*.dtbo
            out/dist/*.img
