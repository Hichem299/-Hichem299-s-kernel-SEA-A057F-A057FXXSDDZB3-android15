name: Build Samsung Galaxy A05s SM-A057F Kernel

on:
  workflow_dispatch:
    inputs:
      kp_target:
        description: "Kernel target"
        required: false
        default: "m269"
      kp_variant:
        description: "Kernel variant"
        required: false
        default: "sec"
      build_variant:
        description: "Build variant"
        required: false
        default: "user"
  push:
    branches:
      - main
      - master

env:
  CLANG_VERSION: r450784e
  CHIPSET_NAME: sm6225
  KP_TARGET: ${{ github.event.inputs.kp_target || 'm269' }}
  KP_VARIANT: ${{ github.event.inputs.kp_variant || 'sec' }}
  TARGET_BUILD_VARIANT: ${{ github.event.inputs.build_variant || 'user' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Free some disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget zip unzip xz-utils zstd lz4 cpio rsync bc bison flex \
            build-essential libssl-dev libelf-dev dwarves pahole python3 python3-pip \
            ca-certificates file jq repo

      - name: Prepare Android prebuilts
        run: |
          set -eux

          mkdir -p kernel_platform/prebuilts/clang/host
          mkdir -p kernel_platform/prebuilts/build-tools
          mkdir -p kernel_platform/prebuilts/kernel-build-tools
          mkdir -p kernel_platform/prebuilts/jdk
          mkdir -p kernel_platform/prebuilts/bazel

          if [ ! -d kernel_platform/prebuilts/clang/host/linux-x86/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
              kernel_platform/prebuilts/clang/host/linux-x86
          fi

          if [ ! -d kernel_platform/prebuilts/build-tools/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/kernel/prebuilts/build-tools \
              kernel_platform/prebuilts/build-tools
          fi

          if [ ! -d kernel_platform/prebuilts/kernel-build-tools/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/kernel/prebuilts/kernel-build-tools \
              kernel_platform/prebuilts/kernel-build-tools
          fi

          if [ ! -d kernel_platform/prebuilts/jdk/jdk11/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/jdk/jdk11 \
              kernel_platform/prebuilts/jdk/jdk11
          fi

          if [ ! -d kernel_platform/prebuilts/bazel/linux-x86_64/.git ]; then
            git clone --depth=1 \
              https://android.googlesource.com/platform/prebuilts/bazel/linux-x86_64 \
              kernel_platform/prebuilts/bazel/linux-x86_64
          fi

      - name: Fix script paths and permissions
        run: |
          set -eux

          chmod +x build_kernel_GKI.sh || true
          find kernel_platform/build -type f -name "*.sh" -exec chmod +x {} \; || true
          find kernel_platform/prebuilts -type f -path "*/bin/*" -exec chmod +x {} \; || true

          sed -i \
            's#./kernel_platform/build/android/prepare_vendor.sh#./kernel_platform/build/kernel/android/prepare_vendor.sh#g' \
            build_kernel_GKI.sh || true

      - name: Show selected config
        run: |
          echo "KP_TARGET=${KP_TARGET}"
          echo "KP_VARIANT=${KP_VARIANT}"
          echo "TARGET_BUILD_VARIANT=${TARGET_BUILD_VARIANT}"
          echo "CHIPSET_NAME=${CHIPSET_NAME}"

      - name: Build kernel
        run: |
          set -eux

          export ANDROID_BUILD_TOP="${GITHUB_WORKSPACE}"
          export ANDROID_PRODUCT_OUT="${GITHUB_WORKSPACE}/out/target/product/${KP_TARGET}"
          export TARGET_PRODUCT="${KP_TARGET}"
          export TARGET_BOARD_PLATFORM="gki"
          export OUT_DIR="${GITHUB_WORKSPACE}/out/msm-${CHIPSET_NAME}-${CHIPSET_NAME}-gki"
          export DIST_DIR="${OUT_DIR}/dist"
          export TARGET_BUILD_VARIANT="${TARGET_BUILD_VARIANT}"
          export BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export KERNEL_VARIANT="${KP_VARIANT}"
          export KERNEL_TARGET="${KP_TARGET}"
          export RECOMPILE_KERNEL=1

          mkdir -p "${ANDROID_PRODUCT_OUT}"
          mkdir -p "${OUT_DIR}"

          ./kernel_platform/build/kernel/android/prepare_vendor.sh "${KP_TARGET}" "${KP_VARIANT}" "${OUT_DIR}"

      - name: Collect artifacts
        if: always()
        run: |
          set +e
          mkdir -p artifacts

          find out -type f \( \
            -name "Image" -o \
            -name "Image.gz" -o \
            -name "Image.gz-dtb" -o \
            -name "boot.img" -o \
            -name "vendor_boot.img" -o \
            -name "dtb.img" -o \
            -name "dtbo.img" -o \
            -name "*.ko" -o \
            -name "System.map" -o \
            -name "modules.load" -o \
            -name "modules.blocklist" -o \
            -name "vmlinux" \
          \) -exec cp --parents {} artifacts/ \; 2>/dev/null || true

          find device -type f 2>/dev/null \( \
            -name "Image" -o \
            -name "*.ko" -o \
            -name "boot.img" -o \
            -name "vendor_boot.img" -o \
            -name "dtb.img" -o \
            -name "dtbo.img" \
          \) -exec cp --parents {} artifacts/ \; || true

          find . -maxdepth 3 -type f -name "*.zip" -exec cp --parents {} artifacts/ \; 2>/dev/null || true

          echo "Collected files:"
          find artifacts -type f | sort || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A05s-A057F-kernel-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 7
