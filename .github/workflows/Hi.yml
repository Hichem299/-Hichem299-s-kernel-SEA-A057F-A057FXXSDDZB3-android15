name: Auto Build A05s Kernel (KVM NVHE)

on:
  workflow_dispatch:

env:
  MODEL: a05s
  REGION: eur
  CARRIER: open
  TARGET_BUILD_VARIANT: user
  CHIPSET_NAME: sm6225
  TARGET_PRODUCT: gki
  TARGET_BOARD_PLATFORM: gki
  KVM_MODE: nvhe

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: Hichem299/-Hichem299-s-kernel-SEA-A057F-A057FXXSDDZB3-android15
          ref: main
          path: kernel_source
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential clang cpio curl dwarves file flex gawk \
            gcc-aarch64-linux-gnu git libelf-dev libncurses-dev libssl-dev \
            llvm lld lz4 p7zip-full python3 rsync unzip zip zstd

      - name: Prepare prebuilt toolchain
        run: |
          cd kernel_source
          if [ ! -d kernel_platform/prebuilts ]; then
            echo "Downloading toolchain..."
            curl -LO --retry 3 https://github.com/ravindu644/android_kernel_sm_x810/releases/download/toolchain/qcom-5.15-toolchain.tar.gz.zip
            curl -LO --retry 3 https://github.com/ravindu644/android_kernel_sm_x810/releases/download/toolchain/qcom-5.15-toolchain.tar.gz.z01
            7z x qcom-5.15-toolchain.tar.gz.zip
            tar -xvf qcom-5.15-toolchain.tar.gz
            rm -f qcom-5.15-toolchain.tar.gz *.zip *.z01
            test -d prebuilts
            mv prebuilts kernel_platform/
            chmod -R +x kernel_platform/prebuilts
          fi

      - name: Add KVM config fragment
        run: |
          cd kernel_source/kernel_platform

          KDIR="."
          if [ -d common ]; then
            KDIR="common"
          fi

          cat > "${KDIR}/arch/arm64/configs/kvm_nvhe.fragment" <<'EOF'
          CONFIG_VIRTUALIZATION=y
          CONFIG_KVM=y
          CONFIG_KVM_ARM_HOST=y
          CONFIG_KVM_ARM_PMU=y
          CONFIG_KVM_ARM_PV_TIME=y
          CONFIG_KVM_ARM_VGIC=y
          CONFIG_KVM_ARM_VGIC_V3=y
          CONFIG_KVM_ARM_VGIC_V3_SYSREGS=y
          CONFIG_KVM_ARM_TIMER=y
          CONFIG_VHOST=y
          CONFIG_VHOST_NET=y
          CONFIG_VHOST_VSOCK=y
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_BLK=y
          CONFIG_VIRTIO_NET=y
          CONFIG_VIRTIO_CONSOLE=y
          CONFIG_VIRTIO_MMIO=y
          EOF

          if [ -x "${KDIR}/scripts/kconfig/merge_config.sh" ]; then
            "${KDIR}/scripts/kconfig/merge_config.sh" -m \
              "${KDIR}/arch/arm64/configs/gki_defconfig" \
              "${KDIR}/arch/arm64/configs/kvm_nvhe.fragment"
          else
            cat "${KDIR}/arch/arm64/configs/kvm_nvhe.fragment" >> \
              "${KDIR}/arch/arm64/configs/gki_defconfig"
          fi

          echo "KVM fragment added successfully"

      - name: Build kernel using build_kernel_GKI.sh
        run: |
          cd kernel_source
          chmod +x build_kernel_GKI.sh

          export MODEL="${MODEL}"
          export REGION="${REGION}"
          export CARRIER="${CARRIER}"
          export TARGET_BUILD_VARIANT="${TARGET_BUILD_VARIANT}"
          export CHIPSET_NAME="${CHIPSET_NAME}"
          export TARGET_PRODUCT="${TARGET_PRODUCT}"
          export TARGET_BOARD_PLATFORM="${TARGET_BOARD_PLATFORM}"

          export KVM=1
          export KVM_HOST=1
          export KBUILD_CFLAGS_KVM="-DENABLE_KVM_HOST"

          ./build_kernel_GKI.sh 2>&1 | tee build.log

      - name: Collect build artifacts
        if: always()
        run: |
          cd kernel_source
          mkdir -p artifacts
          echo "Searching for kernel images and modules..."
          find . -type f \( \
            -name "Image" -o \
            -name "Image.gz" -o \
            -name "boot.img" -o \
            -name "vendor_boot.img" -o \
            -name "init_boot.img" -o \
            -name "*.ko" -o \
            -name "System.map" \
          \) | while read -r file; do
            echo "Copying: ${file}"
            cp --parents "${file}" artifacts/ 2>/dev/null || true
          done
          cp build.log artifacts/ 2>/dev/null || true
          echo "KVM_MODE=${KVM_MODE}" > artifacts/build_info.txt
          echo "Build completed at $(date -u)" >> artifacts/build_info.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A05s-Kernel-KVM-${{ env.KVM_MODE }}-${{ github.run_number }}
          path: kernel_source/artifacts
          if-no-files-found: warn
          retention-days: 7
